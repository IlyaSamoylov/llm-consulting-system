services:
  auth_service:
    build:
      context: ./auth_service
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  bot_service:
    build:
      context: ./bot_service
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    ports:
      - "8001:8001"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]

  bot_poller:
    build:
      context: ./bot_service
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    command: ["python", "-m", "app.bot.runner"]

  bot_worker:
    build:
      context: ./bot_service
    env_file:
      - ./bot_service/.env
    depends_on:
      - redis
      - rabbitmq
    command: ["celery", "-A", "app.infra.celery_app", "worker", "--loglevel=info"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  db:
    image: postgres:15
    container_name: app_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: